<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/darkmode.css">
</head>
<body>

<div class="grid-bg"></div>
<div class="cursor-glow"></div>

<div class="form-box glass glow-border">
<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<select id="role">
<option value="user">Normal User</option>
<option value="staff">Staff</option>
</select>

<input type="text" id="staffId" placeholder="Enter Staff ID (Required for Staff)">

<button onclick="registerUser()" class="btn-primary">Register</button>
<p><a href="login.html">Already have account?</a></p>

</div>

<script src="js/main.js"></script>
<script src="js/darkmode.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
